steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${_WALLETCONNECT_PROJECT_ID}'
      - 'NEXT_PUBLIC_APP_URL=${_APP_URL}'
      - 'NEXT_PUBLIC_VESTING_CONTRACT_ADDRESS=${_VESTING_CONTRACT_ADDRESS}'
      - 'NEXT_PUBLIC_SNACK_TOKEN_ADDRESS=${_SNACK_TOKEN_ADDRESS}'
      - 'NEXT_PUBLIC_BSC_RPC_URL=${_BSC_RPC_URL}'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_VESTING_CONTRACT_ADDRESS=${NEXT_PUBLIC_VESTING_CONTRACT_ADDRESS}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SNACK_TOKEN_ADDRESS=${NEXT_PUBLIC_SNACK_TOKEN_ADDRESS}'
      - '--build-arg'
      - 'NEXT_PUBLIC_BSC_RPC_URL=${NEXT_PUBLIC_BSC_RPC_URL}'
      - '-t'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cryptosnackofficial-claim-vesting/claim-vesting-app:${COMMIT_SHA}'
      - '-t'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cryptosnackofficial-claim-vesting/claim-vesting-app:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '-a'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cryptosnackofficial-claim-vesting/claim-vesting-app'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'claim-vesting-app'
      - '--image'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cryptosnackofficial-claim-vesting/claim-vesting-app:${COMMIT_SHA}'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'

images:
  - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cryptosnackofficial-claim-vesting/claim-vesting-app:${COMMIT_SHA}'
  - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cryptosnackofficial-claim-vesting/claim-vesting-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  # machineType: 'E2_HIGHCPU_8'
  # diskSizeGb: 100

timeout: '1200s'

substitutions:
  _WALLETCONNECT_PROJECT_ID: ''
  _APP_URL: ''
  _VESTING_CONTRACT_ADDRESS: ''
  _SNACK_TOKEN_ADDRESS: ''
  _BSC_RPC_URL: ''
